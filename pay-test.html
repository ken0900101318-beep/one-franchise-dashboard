let state = {};
CATEGORIES.forEach(c => c.items.forEach(i => state[i.n] = { choice: null, note: '' }));

function loadDraft() {
  try {
    const draft = localStorage.getItem(STORAGE_KEY);
    if (draft) {
      const d = JSON.parse(draft);
      state = d.state || state;
      if (d.tester) document.getElementById('tester').value = d.tester;
      if (d.date) document.getElementById('test-date').value = d.date;
    }
  } catch (e) {}
}
function saveDraft() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      state,
      tester: document.getElementById('tester').value,
      date: document.getElementById('test-date').value,
      ts: Date.now(),
    }));
  } catch (e) {}
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category';
    const done = cat.items.filter(i => state[i.n] && state[i.n].choice).length;
    section.innerHTML = `
      <div class="cat-head ${cat.className || ''}" onclick="toggleCat('${cat.key}')">
        <span>${cat.title}</span>
        <span class="cat-count"><span id="done-${cat.key}">${done}</span> / ${cat.items.length}</span>
      </div>
      <div class="cat-body" id="body-${cat.key}"></div>
    `;
    app.appendChild(section);
    const body = section.querySelector('.cat-body');
    cat.items.forEach(item => {
      const cur = state[item.n] || {};
      const div = document.createElement('div');
      div.className = 'item' + (cur.choice === 'bad' || cur.choice === 'partial' ? ' flagged' : '');
      div.innerHTML = `
        <div class="item-title"><span class="item-num">${item.n}</span>${item.t}</div>
        <div class="item-desc"><b>步驟</b>：${item.d}</div>
        <div class="item-expect">✓ <b>預期</b>：${item.e}</div>
        <div class="btn-group">
          <button class="btn-choice ${cur.choice === 'ok' ? 'active ok' : ''}" data-n="${item.n}" data-v="ok">✅ 好</button>
          <button class="btn-choice ${cur.choice === 'bad' ? 'active bad' : ''}" data-n="${item.n}" data-v="bad">❌ 不好</button>
          <button class="btn-choice ${cur.choice === 'partial' ? 'active partial' : ''}" data-n="${item.n}" data-v="partial">⚠ 部分</button>
          <button class="btn-choice ${cur.choice === 'skip' ? 'active skip' : ''}" data-n="${item.n}" data-v="skip">— 略</button>
        </div>
        <textarea class="note-input" data-n="${item.n}" placeholder="備註（異常必填，越詳細越好）">${cur.note || ''}</textarea>
      `;
      body.appendChild(div);
    });
  });
  updateProgress();
}

function toggleCat(key) {
  const body = document.getElementById('body-' + key);
  body.classList.toggle('collapsed');
}
window.toggleCat = toggleCat;

function updateProgress() {
  let total = 0, done = 0;
  CATEGORIES.forEach(cat => {
    cat.items.forEach(item => {
      total++;
      if (state[item.n] && state[item.n].choice) done++;
    });
    const el = document.getElementById('done-' + cat.key);
    if (el) el.textContent = cat.items.filter(i => state[i.n] && state[i.n].choice).length;
  });
  document.getElementById('progress-fill').style.width = (done / total * 100) + '%';
  document.getElementById('progress-text').textContent = `已完成 ${done} / ${total} 項`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

document.addEventListener('click', (e) => {
  if (e.target.classList.contains('btn-choice')) {
    const n = e.target.dataset.n;
    const v = e.target.dataset.v;
    if (!state[n]) state[n] = { choice: null, note: '' };
    state[n].choice = v;
    saveDraft();
    render();
  }
});
document.addEventListener('input', (e) => {
  if (e.target.classList.contains('note-input')) {
    const n = e.target.dataset.n;
    if (!state[n]) state[n] = { choice: null, note: '' };
    state[n].note = e.target.value;
    saveDraft();
  }
});

document.getElementById('btn-save').addEventListener('click', () => {
  saveDraft();
  toast('💾 已暫存到本機');
});

document.getElementById('btn-submit').addEventListener('click', async () => {
  const tester = document.getElementById('tester').value.trim();
  if (!tester) {
    toast('請先填寫測試員姓名');
    document.getElementById('tester').focus();
    return;
  }
  const date = document.getElementById('test-date').value || new Date().toISOString().slice(0,10);

  // 統計
  const results = { ok: [], bad: [], partial: [], skip: [], pending: [] };
  CATEGORIES.forEach(cat => {
    cat.items.forEach(item => {
      const s = state[item.n];
      const rec = { n: item.n, t: item.t, note: s && s.note || '' };
      if (!s || !s.choice) results.pending.push(rec);
      else results[s.choice].push(rec);
    });
  });

  if (results.pending.length > 0) {
    if (!confirm(`還有 ${results.pending.length} 項未完成，確定要現在提交嗎？`)) return;
  }

  const payload = {
    _pay_test_report: true,
    version: VERSION_FULL,
    versionCode: VERSION_CODE,
    tester, date,
    submittedAt: new Date().toISOString(),
    summary: {
      total: Object.values(results).reduce((s, a) => s + a.length, 0),
      ok: results.ok.length,
      bad: results.bad.length,
      partial: results.partial.length,
      skip: results.skip.length,
      pending: results.pending.length,
    },
    results,
    overallNote: document.getElementById('overall-note') ? document.getElementById('overall-note').value : '',
  };

  // 產生唯一 order_no 方便 Ken 撈
  const orderNo = '_TEST_REPORT_' + tester.replace(/\s+/g, '_') + '_' + Date.now();
  const body = new URLSearchParams();
  body.append('order_no', orderNo);
  body.append('params', JSON.stringify(payload));

  let submitOk = false;
  let submitMsg = '';
  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString(),
    });
    const j = await r.json();
    submitOk = j && (j.code === 1 || j.code === '1');
    submitMsg = j && j.msg || '';
  } catch (e) {
    console.warn('submit failed', e);
    submitMsg = e && e.message || String(e);
  }
  if (!submitOk) {
    alert('⚠ 提交可能失敗：' + (submitMsg || '未知錯誤') + '\n請重試或聯繫 Ken');
    return;
  }

  // 顯示結果
  document.getElementById('done-stats').innerHTML = `
    <b>測試員：</b>${tester}<br>
    <b>日期：</b>${date}<br>
    <b>總計：</b>${payload.summary.total} 項<br>
    <b>✅ 通過：</b>${payload.summary.ok} ·
    <b style="color:#ef4444">❌ 失敗：</b>${payload.summary.bad} ·
    <b style="color:#f59e0b">⚠ 部分：</b>${payload.summary.partial} ·
    <b style="color:#94a3b8">略：</b>${payload.summary.skip} ·
    <b>未測：</b>${payload.summary.pending}<br>
    <b>提交時間：</b>${new Date().toLocaleString('zh-TW')}<br>
    <b>編號：</b><code style="font-size:10px;">${orderNo}</code>
  `;
  if (results.bad.length > 0 || results.partial.length > 0) {
    const fails = [...results.bad, ...results.partial];
    document.getElementById('done-fails').style.display = 'block';
    document.getElementById('done-fails').innerHTML =
      '<b>❌ 異常項目：</b><ul>' +
      fails.map(f => `<li>${f.n}. ${f.t}${f.note ? ' — ' + f.note : ''}</li>`).join('') +
      '</ul>';
  }
  document.getElementById('done-screen').classList.add('show');
  localStorage.removeItem(STORAGE_KEY);
});

// 初始化
document.getElementById('test-date').value = new Date().toISOString().slice(0,10);
loadDraft();
render();

// 加整體備註到最下方
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const bottom = document.createElement('div');
    bottom.className = 'bottom-section';
    bottom.innerHTML = `
      <h3>📝 整體備註</h3>
      <textarea id="overall-note" placeholder="其他想補充的（例：整體感受、建議、發現的其他問題）"></textarea>
    `;
    document.getElementById('app').appendChild(bottom);
  }, 0);
});
</script>
</body>
</html>
